version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 3
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      - dependency-name: "pandas"
        update-types:
          - "version-update:semver-major"
    groups:
      python-runtime:
        patterns:
          - "networkx"
          - "numpy"
          - "pandas"
          - "matplotlib"
          - "folium"
          - "plotly"
          - "PyYAML"
      python-dev:
        patterns:
          - "notebook"
          - "ipykernel"
          - "nbformat"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
          
